version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.12"
  jobs:
    post_install:
      - pip install -e .[docs,did,survival,event-study]

sphinx:
  configuration: docs/conf.py
  fail_on_warning: true

formats:
  - pdf
  - htmlzip

python:
  install:
    - method: pip
      path: .
      extra_requirements:
        - docs
