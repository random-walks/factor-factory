[project]
name = "__PROJECT__"

[paths]
notebooks = "notebooks"
data = "data"
artifacts = "artifacts"
site = "site"
manuscripts = "manuscripts"
cache = ".jellycell/cache"

[run]
kernel = "python3"
subprocess = true
timeout_seconds = 600

[viewer]
host = "127.0.0.1"
port = 5179
watch = ["notebooks", "manuscripts", "artifacts"]

[lint]
enforce_artifact_paths = true
enforce_declared_deps = false
warn_on_large_cell_output = "10MB"

[artifacts]
layout = "flat"
max_committed_size_mb = 50

[journal]
enabled = true
path = "journal.md"
