name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: false
      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}
      - name: Create venv
        run: uv venv --python ${{ matrix.python-version }} .venv
      - name: Install dependencies (default + did + dev)
        run: uv pip install -e ".[did,dev]"
      - name: Run pytest
        run: uv run --no-project pytest -v

  lint:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: false
      - name: Set up Python
        run: uv python install 3.12
      - name: Create venv
        run: uv venv --python 3.12 .venv
      - name: Install dev tooling
        run: uv pip install -e ".[dev]"
      - name: ruff format --check
        run: uv run --no-project ruff format --check factor_factory
      - name: ruff lint
        run: uv run --no-project ruff check factor_factory

  typecheck:
    name: mypy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: false
      - name: Set up Python
        run: uv python install 3.12
      - name: Create venv
        run: uv venv --python 3.12 .venv
      - name: Install dependencies
        run: uv pip install -e ".[did,dev]"
      - name: mypy
        run: uv run --no-project mypy factor_factory
