name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest (${{ matrix.os }} / py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true
      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}
      - name: Create venv
        run: uv venv --python ${{ matrix.python-version }} .venv
      - name: Install dependencies (default + did + survival + event-study + dev)
        run: uv pip install -e ".[did,survival,event-study,dev]"
      - name: Run pytest
        run: uv run --no-project pytest -v

  lint:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.12
      - name: Create venv
        run: uv venv --python 3.12 .venv
      - name: Install dev tooling
        run: uv pip install -e ".[dev]"
      - name: ruff format --check
        run: uv run --no-project ruff format --check factor_factory
      - name: ruff lint
        run: uv run --no-project ruff check factor_factory

  typecheck:
    name: mypy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.12
      - name: Create venv
        run: uv venv --python 3.12 .venv
      - name: Install dependencies
        run: uv pip install -e ".[did,survival,event-study,dev]"
      - name: mypy
        run: uv run --no-project mypy factor_factory

  docs:
    name: sphinx docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.12
      - name: Create venv
        run: uv venv --python 3.12 .venv
      - name: Install docs + runtime dependencies
        run: uv pip install -e ".[docs,did,survival,event-study]"
      - name: sphinx-build -W --keep-going
        run: uv run --no-project sphinx-build -W --keep-going -b html docs docs/_build/html
      - name: Upload HTML artifact
        uses: actions/upload-artifact@v7
        with:
          name: docs-html
          path: docs/_build/html
          retention-days: 7
